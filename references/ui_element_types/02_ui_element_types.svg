<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#080c10"/>
      <stop offset="1" stop-color="#10161d"/>
    </linearGradient>
    <style>
      .bg{fill:url(#bg)}
      .panel{fill:#101820;stroke:#2b3a48;stroke-width:1.2;rx:10}
      .card{fill:#0d141b;stroke:#2a3946;stroke-width:1;rx:8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:46px;font-weight:800;fill:#eef5ff;letter-spacing:-1px}
      .num{fill:#4a9bff}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;fill:#aab7c6}
      .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:700;fill:#eaf1fa}
      .p{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#b8c4d1;line-height:1.35}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#8fa0b2}
      .tiny{font-family:JetBrains Mono,Consolas,monospace;font-size:12px;fill:#8fa0b2}
      .mono{font-family:JetBrains Mono,Consolas,monospace;font-size:15px;fill:#dce8f6}
      .blue{fill:#4a9bff}.green{fill:#49d07d}.yellow{fill:#ffbd42}.purple{fill:#b36dff}.red{fill:#ff6170}.cyan{fill:#37d1c9}
      .line{stroke:#2b3a48;stroke-width:1}.accent{stroke:#4a9bff;stroke-width:2}.dash{stroke-dasharray:6 6}
      .chip{fill:#102033;stroke:#265582;stroke-width:1;rx:5}.chiptext{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;fill:#73b7ff;font-weight:600}
      .tableHead{fill:#121e27;stroke:#2b3a48;stroke-width:1}.row{fill:#0d141b;stroke:#20303c;stroke-width:.8}
    </style>
  </defs>
  <rect class="bg" width="1920" height="1080"/>
  <g opacity="0.22" stroke="#2c4050" stroke-width="1">
    <path d="M0 80H1920M0 160H1920M0 240H1920M0 320H1920M0 400H1920M0 480H1920M0 560H1920M0 640H1920M0 720H1920M0 800H1920M0 880H1920M0 960H1920"/>
    <path d="M80 0V1080M160 0V1080M240 0V1080M320 0V1080M400 0V1080M480 0V1080M560 0V1080M640 0V1080M720 0V1080M800 0V1080M880 0V1080M960 0V1080M1040 0V1080M1120 0V1080M1200 0V1080M1280 0V1080M1360 0V1080M1440 0V1080M1520 0V1080M1600 0V1080M1680 0V1080M1760 0V1080M1840 0V1080"/>
  </g>
  <rect x="24" y="22" width="1872" height="1036" rx="16" fill="none" stroke="#30414f"/>

  <text x="54" y="82" class="title"><tspan class="num">02</tspan> ui_element_types</text>
  <text x="56" y="119" class="sub">Słownik: czym jest dany element UI — typ, nie instancja i nie konkretny komponent</text>

  <g transform="translate(54 158)">
    <rect class="card" width="470" height="142"/>
    <text x="26" y="39" class="h"><tspan class="blue">◎</tspan> Cel</text>
    <text x="26" y="76" class="p">Definiuje klasy elementów interfejsu, zanim</text>
    <text x="26" y="98" class="p">powstaną komponenty, instancje i presety.</text>
    <text x="26" y="120" class="p">Typ odpowiada: „czym jest ten element?”</text>
  </g>
  <g transform="translate(560 158)">
    <rect class="card" width="470" height="142"/>
    <text x="26" y="39" class="h"><tspan class="green">□</tspan> Zawiera</text>
    <text x="26" y="76" class="p">button, input, slider, dropdown, tabs, panel,</text>
    <text x="26" y="98" class="p">splitter, dock zone, command palette, table,</text>
    <text x="26" y="120" class="p">tree, modal, popup, feedback i debug overlay.</text>
  </g>
  <g transform="translate(1066 158)">
    <rect class="card" width="470" height="142"/>
    <text x="26" y="39" class="h"><tspan class="purple">⌁</tspan> Używać kiedy</text>
    <text x="26" y="76" class="p">Dodajesz nową klasę UI albo porządkujesz,</text>
    <text x="26" y="98" class="p">czy coś jest primitive, control, component,</text>
    <text x="26" y="120" class="p">container, window, layout, system czy feedback.</text>
  </g>

  <g transform="translate(54 338)">
    <rect class="panel" width="812" height="548"/>
    <text x="24" y="38" class="h">Core registry — najważniejsze typy</text>
    <rect class="tableHead" x="24" y="62" width="764" height="38"/>
    <text x="42" y="86" class="small">name</text><text x="250" y="86" class="small">type_id</text><text x="490" y="86" class="small">category</text><text x="640" y="86" class="small">function</text>
    <g transform="translate(24 104)">
      <g><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Button</text><text x="226" y="23" class="mono">type.button</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">execute command</text></g>
      <g transform="translate(0 34)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Icon Button</text><text x="226" y="23" class="mono">type.button.icon</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">compact action</text></g>
      <g transform="translate(0 68)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Toggle / Switch</text><text x="226" y="23" class="mono">type.switch</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">boolean state</text></g>
      <g transform="translate(0 102)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Text / Number Input</text><text x="226" y="23" class="mono">type.input.*</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">edit value</text></g>
      <g transform="translate(0 136)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Dropdown / Multi Select</text><text x="226" y="23" class="mono">type.dropdown</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">choose option</text></g>
      <g transform="translate(0 170)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Slider / Range Slider</text><text x="226" y="23" class="mono">type.slider.*</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">edit scalar/range</text></g>
      <g transform="translate(0 204)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Color / File Picker</text><text x="226" y="23" class="mono">type.*_picker</text><rect x="466" y="8" width="86" height="20" class="chip"/><text x="486" y="23" class="chiptext">control</text><text x="616" y="23" class="p">pick resource</text></g>
      <g transform="translate(0 238)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Tabs</text><text x="226" y="23" class="mono">type.tabs</text><rect x="466" y="8" width="104" height="20" fill="#0b2a2d" stroke="#1d7f85" rx="5"/><text x="486" y="23" class="chiptext" fill="#37d1c9">navigation</text><text x="616" y="23" class="p">switch content</text></g>
      <g transform="translate(0 272)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Panel / Toolbar</text><text x="226" y="23" class="mono">type.panel</text><rect x="466" y="8" width="98" height="20" fill="#2b2208" stroke="#7f6b19" rx="5"/><text x="486" y="23" class="chiptext" fill="#ffbd42">container</text><text x="616" y="23" class="p">hold children</text></g>
      <g transform="translate(0 306)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Property Row</text><text x="226" y="23" class="mono">type.property_row</text><rect x="466" y="8" width="98" height="20" fill="#23183a" stroke="#6842a1" rx="5"/><text x="486" y="23" class="chiptext" fill="#b36dff">component</text><text x="616" y="23" class="p">label + editor</text></g>
      <g transform="translate(0 340)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Modal / Popup</text><text x="226" y="23" class="mono">type.dialog.*</text><rect x="466" y="8" width="86" height="20" fill="#3a171a" stroke="#8d3a42" rx="5"/><text x="486" y="23" class="chiptext" fill="#ff6170">window</text><text x="616" y="23" class="p">block / overlay</text></g>
      <g transform="translate(0 374)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Splitter / Dock Zone</text><text x="226" y="23" class="mono">type.dock_zone</text><rect x="466" y="8" width="86" height="20" fill="#30210b" stroke="#98601e" rx="5"/><text x="486" y="23" class="chiptext" fill="#ff9c35">layout</text><text x="616" y="23" class="p">resize / dock</text></g>
      <g transform="translate(0 408)"><rect class="row" width="764" height="34"/><text x="18" y="23" class="p">Command Palette</text><text x="226" y="23" class="mono">type.command_palette</text><rect x="466" y="8" width="86" height="20" fill="#1c2630" stroke="#5a6875" rx="5"/><text x="486" y="23" class="chiptext" fill="#b8c4d1">system</text><text x="616" y="23" class="p">find + execute</text></g>
    </g>
  </g>

  <g transform="translate(906 338)">
    <rect class="panel" width="478" height="252"/>
    <text x="24" y="38" class="h">Dopisać jako brakujące</text>
    <text x="24" y="74" class="p"><tspan class="cyan">primitive:</tspan> label, text_block, icon, divider</text>
    <text x="24" y="104" class="p"><tspan class="yellow">layout:</tspan> spacer, section, group, resize_boundary</text>
    <text x="24" y="134" class="p"><tspan class="green">component:</tspan> list, table, tree, card, breadcrumb</text>
    <text x="24" y="164" class="p"><tspan class="red">window/feedback:</tspan> popup, tooltip, toast, badge</text>
    <text x="24" y="194" class="p"><tspan class="blue">system:</tspan> canvas, selection_box, transform_handle</text>
    <text x="24" y="224" class="p"><tspan class="purple">debug:</tspan> debug_overlay, validation_marker</text>
  </g>

  <g transform="translate(1418 338)">
    <rect class="panel" width="424" height="252"/>
    <text x="24" y="38" class="h">Najważniejsza zasada</text>
    <text x="24" y="78" class="p">Typ UI ≠ komponent ≠ instancja.</text>
    <text x="24" y="113" class="mono">type.button</text>
    <path d="M70 130v34" class="accent"/>
    <text x="24" y="188" class="mono">component.save_button</text>
    <path d="M70 205v34" class="accent"/>
    <text x="24" y="263" class="mono" transform="translate(0 -24)">button_save_01</text>
  </g>

  <g transform="translate(906 622)">
    <rect class="panel" width="936" height="264"/>
    <text x="24" y="38" class="h">Relacje systemowe</text>
    <rect x="334" y="74" width="250" height="42" rx="8" fill="#112033" stroke="#4a9bff"/>
    <text x="384" y="101" class="mono">ui_element_types</text>
    <g class="mono">
      <rect x="62" y="164" width="190" height="42" rx="7" fill="#0d141b" stroke="#2b3a48"/><text x="88" y="191">ui_components</text>
      <rect x="302" y="164" width="170" height="42" rx="7" fill="#0d141b" stroke="#2b3a48"/><text x="340" y="191">ui_states</text>
      <rect x="522" y="164" width="190" height="42" rx="7" fill="#0d141b" stroke="#2b3a48"/><text x="548" y="191">design_tokens</text>
      <rect x="752" y="164" width="140" height="42" rx="7" fill="#0d141b" stroke="#2b3a48"/><text x="782" y="191">commands</text>
    </g>
    <path d="M459 116 C230 132 190 148 157 164" class="accent" fill="none"/><path d="M459 116 C410 132 388 148 387 164" class="accent" fill="none"/>
    <path d="M459 116 C590 132 620 148 617 164" class="accent" fill="none"/><path d="M459 116 C730 132 805 148 822 164" class="accent" fill="none"/>
    <text x="52" y="236" class="small">Komponent wskazuje typ.</text>
    <text x="300" y="236" class="small">Typ deklaruje stany.</text>
    <text x="520" y="236" class="small">Wygląd pochodzi z tokenów.</text>
    <text x="728" y="236" class="small">Akcje idą przez command registry.</text>
  </g>

  <g transform="translate(54 920)">
    <rect class="card" width="582" height="96"/>
    <text x="24" y="35" class="h"><tspan class="blue">⚖</tspan> Zasady</text>
    <text x="24" y="66" class="p">Każdy komponent ma jeden główny type_id. Typ opisuje odpowiedzialność, nie wygląd i nie dane aplikacji.</text>
  </g>
  <g transform="translate(670 920)">
    <rect class="card" width="582" height="96"/>
    <text x="24" y="35" class="h"><tspan class="red">×</tspan> Czego unikać</text>
    <text x="24" y="66" class="p">Nie twórz typów pod konkretne przypadki: save_button, blue_panel, project_modal. To komponenty albo presety.</text>
  </g>
  <g transform="translate(1286 920)">
    <rect class="card" width="556" height="96"/>
    <text x="24" y="35" class="h"><tspan class="green">✓</tspan> MVP</text>
    <text x="24" y="66" class="p">P0: button, inputs, slider, dropdown, panel, property_row, tabs, splitter, dock_zone, command_palette.</text>
  </g>
</svg>
